<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Конвертер валют — семейный бюджет</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg-1: #0f172a;
            --bg-2: #1e1b4b;
            --accent: #38bdf8;
            --accent-2: #a78bfa;
            --glass: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text: #f1f5f9;
            --muted: #94a3b8;
            --success: #34d399;
            --error: #f87171;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "DM Sans", system-ui, sans-serif;
            color: var(--text);
            overflow-x: hidden;
        }

        .bg-stage {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: linear-gradient(125deg, var(--bg-1) 0%, #0c4a6e 45%, var(--bg-2) 100%);
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.45;
            animation: float-orb 18s ease-in-out infinite;
        }

        .orb-1 {
            width: 420px;
            height: 420px;
            background: radial-gradient(circle, #38bdf8, transparent 70%);
            top: -120px;
            right: -80px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 380px;
            height: 380px;
            background: radial-gradient(circle, #a78bfa, transparent 70%);
            bottom: -100px;
            left: -60px;
            animation-delay: -6s;
        }

        .orb-3 {
            width: 280px;
            height: 280px;
            background: radial-gradient(circle, #f472b6, transparent 70%);
            top: 40%;
            left: 35%;
            opacity: 0.25;
            animation-delay: -12s;
        }

        @keyframes float-orb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -25px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }

        .grid-overlay {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 48px 48px;
            mask-image: radial-gradient(ellipse 80% 60% at 50% 40%, black, transparent);
            pointer-events: none;
        }

        .wrap {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
        }

        .panel {
            width: min(440px, 100%);
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 28px 26px 26px;
            box-shadow:
                0 4px 24px rgba(0, 0, 0, 0.35),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
            animation: panel-in 0.85s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0;
            transform: translateY(28px) scale(0.97);
        }

        @keyframes panel-in {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .head {
            text-align: center;
            margin-bottom: 22px;
        }

        .head h1 {
            margin: 0 0 6px;
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .head p {
            margin: 0;
            font-size: 0.85rem;
            color: var(--muted);
        }

        .field-label {
            display: block;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .amount-wrap {
            position: relative;
            margin-bottom: 18px;
        }

        .amount-wrap input {
            width: 100%;
            padding: 14px 16px;
            font-size: 1.35rem;
            font-weight: 600;
            font-family: inherit;
            color: var(--text);
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s, transform 0.2s;
        }

        .amount-wrap input:focus {
            border-color: rgba(56, 189, 248, 0.5);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
        }

        .amount-wrap input::placeholder {
            color: var(--muted);
            font-weight: 400;
        }

        .currency-row {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 10px;
            align-items: center;
            margin-bottom: 18px;
        }

        .select-shell {
            position: relative;
        }

        .select-shell select {
            width: 100%;
            appearance: none;
            padding: 12px 38px 12px 14px;
            font-size: 0.95rem;
            font-family: inherit;
            color: var(--text);
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            cursor: pointer;
            transition: border-color 0.25s, transform 0.2s;
        }

        .select-shell select:hover {
            border-color: rgba(167, 139, 250, 0.35);
        }

        .select-shell::after {
            content: "";
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            border: 5px solid transparent;
            border-top-color: var(--muted);
            pointer-events: none;
        }

        .swap-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            background: linear-gradient(145deg, rgba(56, 189, 248, 0.25), rgba(167, 139, 250, 0.2));
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.15rem;
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.25s;
            flex-shrink: 0;
        }

        .swap-btn:hover {
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.35);
        }

        .swap-btn:active {
            transform: scale(0.92);
        }

        .swap-btn.spin {
            transform: rotate(180deg);
        }

        .result-block {
            text-align: center;
            padding: 16px 14px;
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            margin-bottom: 20px;
            min-height: 72px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: border-color 0.3s;
        }

        .result-block.updating {
            border-color: rgba(56, 189, 248, 0.4);
        }

        .result-main {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            animation: result-pop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .result-main.static {
            animation: none;
        }

        .result-main.result-error {
            color: var(--error);
            font-size: 1rem;
            font-weight: 600;
        }

        @keyframes result-pop {
            from {
                opacity: 0;
                transform: scale(0.92) translateY(6px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .result-rate {
            margin-top: 6px;
            font-size: 0.8rem;
            color: var(--muted);
        }

        .chart-section {
            margin-top: 4px;
            padding-top: 18px;
            border-top: 1px solid var(--glass-border);
            animation: fade-up 0.7s ease 0.15s both;
        }

        @keyframes fade-up {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .chart-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .chart-head h2 {
            margin: 0;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: var(--muted);
            font-weight: 600;
        }

        .chart-badge {
            font-size: 0.72rem;
            padding: 4px 10px;
            border-radius: 999px;
            background: rgba(52, 211, 153, 0.15);
            color: var(--success);
            border: 1px solid rgba(52, 211, 153, 0.25);
        }

        .chart-badge.muted {
            background: rgba(148, 163, 184, 0.12);
            color: var(--muted);
            border-color: var(--glass-border);
        }

        .chart-wrap {
            position: relative;
            height: 200px;
            margin-top: 4px;
        }

        .chart-wrap canvas {
            animation: chart-in 0.9s ease 0.1s both;
        }

        @keyframes chart-in {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .skeleton {
            position: absolute;
            inset: 0;
            border-radius: 12px;
            background: linear-gradient(
                90deg,
                rgba(255,255,255,0.04) 0%,
                rgba(255,255,255,0.09) 50%,
                rgba(255,255,255,0.04) 100%
            );
            background-size: 200% 100%;
            animation: shimmer 1.2s ease infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .hidden { display: none !important; }

        @media (max-width: 400px) {
            .currency-row {
                grid-template-columns: 1fr;
                justify-items: center;
            }
            .swap-btn { order: 2; }
        }
    </style>
</head>
<body>
    <div class="bg-stage" aria-hidden="true">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="grid-overlay"></div>
    </div>

    <div class="wrap">
        <div class="panel" id="mainPanel">
            <header class="head">
                <h1>Конвертер валют</h1>
                <p>Курсы обновляются при вводе · для графика — последние 30 дней</p>
            </header>

            <label class="field-label" for="amount">Сумма</label>
            <div class="amount-wrap">
                <input type="number" id="amount" min="0" step="any" placeholder="0" value="1" inputmode="decimal">
            </div>

            <div class="currency-row">
                <div class="select-shell">
                    <label class="field-label" for="fromCurrency" style="margin-bottom:6px;">Из</label>
                    <select id="fromCurrency" aria-label="Валюта из"></select>
                </div>
                <button type="button" class="swap-btn" id="swapBtn" title="Поменять валюты местами" aria-label="Поменять валюты местами">⇄</button>
                <div class="select-shell">
                    <label class="field-label" for="toCurrency" style="margin-bottom:6px;">В</label>
                    <select id="toCurrency" aria-label="Валюта в"></select>
                </div>
            </div>

            <div class="result-block" id="resultBlock">
                <div class="result-main static" id="resultMain">Введите сумму</div>
                <div class="result-rate" id="resultRate"></div>
            </div>

            <section class="chart-section">
                <div class="chart-head">
                    <h2>История курса</h2>
                    <span class="chart-badge muted" id="chartBadge">загрузка…</span>
                </div>
                <div class="chart-wrap">
                    <div class="skeleton" id="chartSkeleton"></div>
                    <canvas id="rateChart" class="hidden"></canvas>
                    <p id="chartFallback" class="hidden" style="margin:0;font-size:0.85rem;color:var(--muted);text-align:center;padding:48px 12px;"></p>
                </div>
            </section>
        </div>
    </div>

    <script>
        const CURRENCIES = [
            { code: "USD", name: "Доллар США", flag: "🇺🇸" },
            { code: "EUR", name: "Евро", flag: "🇪🇺" },
            { code: "GBP", name: "Фунт стерлингов", flag: "🇬🇧" },
            { code: "RUB", name: "Российский рубль", flag: "🇷🇺" },
            { code: "JPY", name: "Иена", flag: "🇯🇵" },
            { code: "CHF", name: "Швейцарский франк", flag: "🇨🇭" },
            { code: "CNY", name: "Юань", flag: "🇨🇳" },
            { code: "TRY", name: "Турецкая лира", flag: "🇹🇷" },
            { code: "PLN", name: "Злотый", flag: "🇵🇱" },
            { code: "UAH", name: "Гривна", flag: "🇺🇦" },
            { code: "KZT", name: "Тенге", flag: "🇰🇿" },
            { code: "BYN", name: "Белорусский рубль", flag: "🇧🇾" },
            { code: "CAD", name: "Канадский доллар", flag: "🇨🇦" },
            { code: "AUD", name: "Австралийский доллар", flag: "🇦🇺" },
            { code: "NZD", name: "Новозеландский доллар", flag: "🇳🇿" },
            { code: "SEK", name: "Шведская крона", flag: "🇸🇪" },
            { code: "NOK", name: "Норвежская крона", flag: "🇳🇴" },
            { code: "DKK", name: "Датская крона", flag: "🇩🇰" },
            { code: "CZK", name: "Чешская крона", flag: "🇨🇿" },
            { code: "HUF", name: "Форинт", flag: "🇭🇺" },
            { code: "RON", name: "Румынский лей", flag: "🇷🇴" },
            { code: "BGN", name: "Болгарский лев", flag: "🇧🇬" },
            { code: "INR", name: "Индийская рупия", flag: "🇮🇳" },
            { code: "KRW", name: "Вона", flag: "🇰🇷" },
            { code: "SGD", name: "Сингапурский доллар", flag: "🇸🇬" },
            { code: "HKD", name: "Гонконгский доллар", flag: "🇭🇰" },
            { code: "MXN", name: "Мексиканское песо", flag: "🇲🇽" },
            { code: "BRL", name: "Бразильский реал", flag: "🇧🇷" },
            { code: "ZAR", name: "Рэнд", flag: "🇿🇦" },
            { code: "AED", name: "Дирхам ОАЭ", flag: "🇦🇪" },
            { code: "ILS", name: "Новый шекель", flag: "🇮🇱" },
            { code: "THB", name: "Бат", flag: "🇹🇭" },
        ];

        const FRANKFURTER = new Set([
            "AUD", "BGN", "BRL", "CAD", "CHF", "CNY", "CZK", "DKK", "EUR", "GBP",
            "HKD", "HUF", "IDR", "ILS", "INR", "ISK", "JPY", "KRW", "MXN", "MYR",
            "NOK", "NZD", "PHP", "PLN", "RON", "SEK", "SGD", "THB", "TRY", "USD", "ZAR",
        ]);

        const LATEST_URL = (base) => `https://api.exchangerate-api.com/v4/latest/${base}`;
        const DEBOUNCE_MS = 380;
        const CACHE_TTL_MS = 5 * 60 * 1000;

        const latestCache = new Map();

        let chartInstance = null;
        let debounceTimer = null;
        let convertSeq = 0;

        const $ = (id) => document.getElementById(id);

        function pulseResultMain() {
            const el = $("resultMain");
            el.classList.add("static");
            void el.offsetWidth;
            el.classList.remove("static");
        }

        function fillSelects() {
            const fromSel = $("fromCurrency");
            const toSel = $("toCurrency");
            fromSel.innerHTML = "";
            toSel.innerHTML = "";
            CURRENCIES.forEach((c) => {
                const label = `${c.flag} ${c.code} — ${c.name}`;
                fromSel.appendChild(new Option(label, c.code));
                toSel.appendChild(new Option(label, c.code));
            });
            fromSel.value = "USD";
            toSel.value = "EUR";
        }

        function getCachedLatest(base) {
            const hit = latestCache.get(base);
            if (hit && Date.now() - hit.t < CACHE_TTL_MS) return hit.data;
            return null;
        }

        function setCachedLatest(base, data) {
            latestCache.set(base, { t: Date.now(), data });
        }

        async function fetchLatest(base) {
            const cached = getCachedLatest(base);
            if (cached) return cached;
            const res = await fetch(LATEST_URL(base));
            if (!res.ok) throw new Error("HTTP " + res.status);
            const data = await res.json();
            if (!data.rates || typeof data.rates !== "object") throw new Error("Неверный ответ API");
            setCachedLatest(base, data);
            return data;
        }

        function formatNum(n, maxFrac = 4) {
            const x = Number(n);
            if (!Number.isFinite(x)) return "—";
            return x.toLocaleString("ru-RU", {
                minimumFractionDigits: 0,
                maximumFractionDigits: maxFrac,
            });
        }

        async function convertAndRender() {
            const seq = ++convertSeq;
            const amountRaw = $("amount").value;
            const from = $("fromCurrency").value;
            const to = $("toCurrency").value;
            const block = $("resultBlock");
            const main = $("resultMain");
            const rateEl = $("resultRate");

            const amount = parseFloat(String(amountRaw).replace(",", "."));
            if (amountRaw === "" || !Number.isFinite(amount) || amount < 0) {
                main.textContent = "Введите корректную сумму";
                main.classList.remove("result-error");
                main.classList.add("static");
                rateEl.textContent = "";
                block.classList.remove("updating");
                return;
            }
            if (from === to) {
                main.textContent = `${formatNum(amount, 2)} ${from} = ${formatNum(amount, 2)} ${to}`;
                pulseResultMain();
                rateEl.textContent = "Одинаковые валюты — курс 1";
                return;
            }

            block.classList.add("updating");

            try {
                const data = await fetchLatest(from);
                if (seq !== convertSeq) return;
                const rate = data.rates[to];
                if (rate == null) {
                    throw new Error("Курс для пары недоступен");
                }
                const result = amount * rate;
                main.textContent = `${formatNum(amount, 2)} ${from} = ${formatNum(result, 2)} ${to}`;
                pulseResultMain();
                main.classList.remove("result-error");
                rateEl.textContent = `1 ${from} = ${formatNum(rate, 6)} ${to} · обновлено с API`;
            } catch (e) {
                if (seq !== convertSeq) return;
                main.textContent = "Не удалось загрузить курс. Проверьте сеть.";
                main.classList.add("result-error");
                pulseResultMain();
                rateEl.textContent = "";
                console.error(e);
            } finally {
                if (seq === convertSeq) block.classList.remove("updating");
            }
        }

        function scheduleConvert() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(convertAndRender, DEBOUNCE_MS);
        }

        function swapCurrencies() {
            const from = $("fromCurrency");
            const to = $("toCurrency");
            const a = from.value;
            const b = to.value;
            from.value = b;
            to.value = a;
            $("swapBtn").classList.add("spin");
            setTimeout(() => $("swapBtn").classList.remove("spin"), 400);
            loadHistoryChart();
            convertAndRender();
        }

        function ymd(d) {
            return d.toISOString().slice(0, 10);
        }

        async function loadHistoryChart() {
            const from = $("fromCurrency").value;
            const to = $("toCurrency").value;
            const canvas = $("rateChart");
            const skel = $("chartSkeleton");
            const fb = $("chartFallback");
            const badge = $("chartBadge");

            const destroyChart = () => {
                if (chartInstance) {
                    chartInstance.destroy();
                    chartInstance = null;
                }
            };

            destroyChart();
            canvas.classList.add("hidden");
            fb.classList.add("hidden");
            skel.classList.remove("hidden");
            badge.textContent = "загрузка…";
            badge.className = "chart-badge muted";

            if (from === to) {
                skel.classList.add("hidden");
                fb.classList.remove("hidden");
                fb.textContent = "Выберите разные валюты для графика.";
                return;
            }

            if (!FRANKFURTER.has(from) || !FRANKFURTER.has(to)) {
                skel.classList.add("hidden");
                fb.classList.remove("hidden");
                fb.textContent =
                    "История по Frankfurter доступна не для всех валют (например, RUB, UAH, KZT). Текущий курс сверху всё равно из основного API.";
                badge.textContent = "график недоступен";
                return;
            }

            const end = new Date();
            const start = new Date();
            start.setDate(start.getDate() - 30);
            const url = `https://api.frankfurter.app/${ymd(start)}..${ymd(end)}?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}`;

            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error("Frankfurter " + res.status);
                const data = await res.json();
                const rates = data.rates || {};
                const dates = Object.keys(rates).sort();
                const values = dates.map((d) => {
                    const day = rates[d];
                    return day && typeof day[to] === "number" ? day[to] : null;
                });
                const cleanDates = [];
                const cleanVals = [];
                dates.forEach((d, i) => {
                    if (values[i] != null) {
                        cleanDates.push(d);
                        cleanVals.push(values[i]);
                    }
                });

                skel.classList.add("hidden");
                if (cleanVals.length < 2) {
                    fb.classList.remove("hidden");
                    fb.textContent = "Недостаточно точек для графика.";
                    badge.textContent = "мало данных";
                    return;
                }

                canvas.classList.remove("hidden");
                const ctx = canvas.getContext("2d");
                const grad = ctx.createLinearGradient(0, 0, 0, 200);
                grad.addColorStop(0, "rgba(56, 189, 248, 0.45)");
                grad.addColorStop(1, "rgba(56, 189, 248, 0)");

                chartInstance = new Chart(ctx, {
                    type: "line",
                    data: {
                        labels: cleanDates.map((d) => {
                            const [y, m, day] = d.split("-");
                            return `${day}.${m}`;
                        }),
                        datasets: [{
                            label: `1 ${from} → ${to}`,
                            data: cleanVals,
                            borderColor: "#38bdf8",
                            backgroundColor: grad,
                            borderWidth: 2,
                            fill: true,
                            tension: 0.35,
                            pointRadius: 0,
                            pointHoverRadius: 5,
                            pointHoverBackgroundColor: "#a78bfa",
                            pointHoverBorderColor: "#fff",
                            pointHoverBorderWidth: 2,
                        }],
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        animation: {
                            duration: 1100,
                            easing: "easeOutQuart",
                        },
                        interaction: { intersect: false, mode: "index" },
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                backgroundColor: "rgba(15, 23, 42, 0.92)",
                                titleColor: "#e2e8f0",
                                bodyColor: "#38bdf8",
                                borderColor: "rgba(56, 189, 248, 0.3)",
                                borderWidth: 1,
                                padding: 10,
                                callbacks: {
                                    label(ctx) {
                                        return ` ${formatNum(ctx.parsed.y, 6)} ${to}`;
                                    },
                                },
                            },
                        },
                        scales: {
                            x: {
                                grid: { color: "rgba(255,255,255,0.06)" },
                                ticks: { color: "#64748b", maxRotation: 0, autoSkip: true, maxTicksLimit: 8 },
                            },
                            y: {
                                grid: { color: "rgba(255,255,255,0.06)" },
                                ticks: {
                                    color: "#64748b",
                                    callback(v) {
                                        return formatNum(v, 4);
                                    },
                                },
                            },
                        },
                    },
                });
                badge.textContent = "30 дней · Frankfurter";
                badge.className = "chart-badge";
            } catch (e) {
                console.error(e);
                skel.classList.add("hidden");
                fb.classList.remove("hidden");
                fb.textContent = "Не удалось загрузить историю курса.";
                badge.textContent = "ошибка";
            }
        }

        fillSelects();

        $("amount").addEventListener("input", scheduleConvert);
        $("amount").addEventListener("change", convertAndRender);
        $("fromCurrency").addEventListener("change", () => {
            scheduleConvert();
            loadHistoryChart();
        });
        $("toCurrency").addEventListener("change", () => {
            scheduleConvert();
            loadHistoryChart();
        });
        $("swapBtn").addEventListener("click", swapCurrencies);

        convertAndRender();
        loadHistoryChart();
    </script>
</body>
</html>
